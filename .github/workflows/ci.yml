name: CI - Build, Test and Push to GCP Artifact Registry

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'promote-prod-sim — promote current staging tag to prod-sim'
        required: true
        default: 'promote-prod-sim'
        type: choice
        options:
          - promote-prod-sim

permissions:
  contents: read
  id-token: write

env:
  BACKEND_IMAGE: todo-backend
  FRONTEND_IMAGE: todo-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 - Backend : compile + test + upload JAR
  # ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend - Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and Test
        run: mvn verify -q

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 - Frontend : build + upload dist
  # ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3 - Docker Build and Push to GCP Artifact Registry
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'
    env:
      # ✅ REGISTRY défini au niveau du job, pas globalement
      REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── Authentification GCP via OIDC ─────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      # ── Backend ───────────────────────────────────────────────
      - name: Build Backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            ./backend

      - name: Scan Backend image
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      - name: Push Backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      # ── Frontend ──────────────────────────────────────────────
      - name: Build Frontend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            ./frontend

      - name: Scan Frontend image
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      - name: Push Frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      # ── GitOps - Update repo-config ───────────────────────────
      - name: Determine target environment
        id: env-target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "values_file=charts/todo-app/values-staging.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "values_file=charts/todo-app/values-dev.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Open GitOps PR on repo-config
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CONFIG_REPO: ${{ vars.CONFIG_REPO }}
          VALUES_FILE: ${{ steps.env-target.outputs.values_file }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}

        run: |
          set -euo pipefail

          echo "Using IMAGE_TAG=$IMAGE_TAG"

          # ─────────────────────────────────────────────
          # 1. VERIFY IMAGES EXIST IN REGISTRY
          # ─────────────────────────────────────────────
          gcloud artifacts docker tags list \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }} \
            --filter="tag:${IMAGE_TAG}" \
            --format="value(tag)" | grep -q "${IMAGE_TAG}"
          echo "Backend image exists ✔"

          gcloud artifacts docker tags list \
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }} \
            --filter="tag:${IMAGE_TAG}" \
            --format="value(tag)" | grep -q "${IMAGE_TAG}"
          echo "Frontend image exists ✔"

          # ─────────────────────────────────────────────
          # 2. CLONE CONFIG REPO
          # ─────────────────────────────────────────────
          git clone \
            https://x-access-token:${GH_TOKEN}@github.com/${CONFIG_REPO}.git \
            config-repo
          cd config-repo

          # ─────────────────────────────────────────────
          # 3. REBASE SUR LE MAIN LE PLUS RECENT
          #    Garantit que la branche part du HEAD courant
          #    même si une autre PR a mergé entre-temps.
          # ─────────────────────────────────────────────
          git fetch origin main
          git rebase origin/main

          BRANCH="gitops/${IMAGE_TAG}"
          git checkout -b "$BRANCH"

          # ─────────────────────────────────────────────
          # 4. PATCH VALUES FILE
          # ─────────────────────────────────────────────
          yq eval '
            .backend.image.tag  = strenv(IMAGE_TAG) |
            .frontend.image.tag = strenv(IMAGE_TAG)
          ' -i ${VALUES_FILE}

          echo "Updated values:"
          yq eval '.backend.image.tag, .frontend.image.tag' ${VALUES_FILE}

          # ─────────────────────────────────────────────
          # 5. COMMIT + PUSH BRANCH
          # ─────────────────────────────────────────────
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add ${VALUES_FILE}

          if git diff --cached --quiet; then
            echo "No changes — image tag already up to date."
            exit 0
          fi

          git commit -m "ci: update image tags to ${IMAGE_TAG}"
          git push origin "$BRANCH"

          # ─────────────────────────────────────────────
          # 6. OPEN PR + AUTO-MERGE (squash)
          #    Sans "Require up to date" : GitHub applique
          #    le diff sur le HEAD courant de main.
          #    Le rebase (step 3) évite les conflits YAML.
          # ─────────────────────────────────────────────
          gh pr create \
            --repo "$CONFIG_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "ci: deploy ${IMAGE_TAG}" \
            --body "Automated GitOps update triggered by todo-app@${IMAGE_TAG}."

          gh pr merge "$BRANCH" \
            --repo "$CONFIG_REPO" \
            --squash \
            --auto \
            --delete-branch

          echo "GitOps PR opened and auto-merge enabled ✔"

  # ─────────────────────────────────────────────────────────────
  # JOB 4 - Promote staging → prod-sim (manuel via workflow_dispatch)
  # ─────────────────────────────────────────────────────────────
  promote-prod-sim:
    name: Promote staging tag to prod-sim
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Promote staging tag to prod-sim
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CONFIG_REPO: ${{ vars.CONFIG_REPO }}
        run: |
          set -euo pipefail

          git clone \
            https://x-access-token:${GH_TOKEN}@github.com/${CONFIG_REPO}.git \
            config-repo
          cd config-repo

          STAGING_TAG=$(yq eval '.backend.image.tag' charts/todo-app/values-staging.yaml)
          echo "Promoting tag: $STAGING_TAG → prod-sim"

          git fetch origin main
          git rebase origin/main

          BRANCH="gitops/promote-${STAGING_TAG}-prod-sim"
          git checkout -b "$BRANCH"

          IMAGE_TAG="$STAGING_TAG" yq eval '
            .backend.image.tag  = strenv(IMAGE_TAG) |
            .frontend.image.tag = strenv(IMAGE_TAG)
          ' -i charts/todo-app/values-prod-sim.yaml

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add charts/todo-app/values-prod-sim.yaml

          if git diff --cached --quiet; then
            echo "prod-sim already at $STAGING_TAG — nothing to promote."
            exit 0
          fi

          git commit -m "ci: promote ${STAGING_TAG} to prod-sim"
          git push origin "$BRANCH"

          gh pr create \
            --repo "$CONFIG_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "ci: promote ${STAGING_TAG} to prod-sim" \
            --body "Manual promotion: staging@${STAGING_TAG} → prod-sim"

          gh pr merge "$BRANCH" \
            --repo "$CONFIG_REPO" \
            --squash \
            --auto \
            --delete-branch

          echo "Promotion to prod-sim completed ✔"