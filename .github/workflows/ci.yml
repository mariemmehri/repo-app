name: CI - Build, Test and Push to GCP Artifact Registry

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  BACKEND_IMAGE: todo-backend
  FRONTEND_IMAGE: todo-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 - Backend : compile + test + upload JAR
  # Runs on: push/PR to dev or main (not on tags)
  # ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend - Build and Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and Test
        run: mvn verify -q

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 - Frontend : build + upload dist
  # Runs on: push/PR to dev or main (not on tags)
  # ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend - Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3 - Docker Build, Scan, Push + GitOps patch → dev
  # Runs on: push to dev ONLY
  # Pattern: build once here — staging and prod-sim PROMOTE this image
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build and Push (dev)
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    env:
      REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── Authentification GCP via OIDC ─────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-trivy-

      # ── Backend ───────────────────────────────────────────────
      - name: Build Backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            ./backend

      - name: Scan Backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-backend.sarif
          cache-dir: ~/.cache/trivy

      - name: Upload Backend scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Push Backend image
        run: docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      # ── Frontend ──────────────────────────────────────────────
      - name: Build Frontend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            ./frontend

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-frontend.sarif
          cache-dir: ~/.cache/trivy

      - name: Upload Frontend scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Push Frontend image
        run: docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      # ── GitOps : patch values-dev.yaml ────────────────────────
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Patch values-dev.yaml with new image tag
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CONFIG_REPO: ${{ vars.CONFIG_REPO }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_USER_NAME: "github-actions[bot]"
        run: |
          set -euo pipefail

          echo "IMAGE_TAG=$IMAGE_TAG → dev"

          gcloud artifacts docker tags list \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }} \
            --filter="tag:${IMAGE_TAG}" \
            --format="value(tag)" | grep -q "${IMAGE_TAG}"
          echo "Backend image exists ✔"

          gcloud artifacts docker tags list \
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }} \
            --filter="tag:${IMAGE_TAG}" \
            --format="value(tag)" | grep -q "${IMAGE_TAG}"
          echo "Frontend image exists ✔"

          git clone --depth 1 \
            https://x-access-token:${GH_PAT}@github.com/${CONFIG_REPO}.git config-repo
          cd config-repo
          git pull --rebase origin main

          yq eval '
            .backend.image.tag = strenv(IMAGE_TAG) |
            .frontend.image.tag = strenv(IMAGE_TAG)
          ' -i charts/todo-app/values-dev.yaml

          git config user.email "${GIT_USER_EMAIL}"
          git config user.name "${GIT_USER_NAME}"
          git add charts/todo-app/values-dev.yaml

          if git diff --cached --quiet; then echo "No changes"; exit 0; fi

          git commit -m "ci: deploy dev → ${IMAGE_TAG}"
          git push origin HEAD:main
          echo "GitOps dev update ✔"

  # ─────────────────────────────────────────────────────────────
  # JOB 4 - Promote dev → staging (NO docker build)
  # Runs on: push to main ONLY
  # Reads the tag already validated in dev, writes it to staging
  # ─────────────────────────────────────────────────────────────
  promote-staging:
    name: Promote dev → staging
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Promote image tag dev → staging
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_REPO: ${{ vars.CONFIG_REPO }}
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_USER_NAME: "github-actions[bot]"
        run: |
          set -euo pipefail

          git clone --depth 1 \
            https://x-access-token:${GH_PAT}@github.com/${CONFIG_REPO}.git config-repo
          cd config-repo
          git pull --rebase origin main

          # Lit le tag actuellement validé en dev
          IMAGE_TAG=$(yq eval '.backend.image.tag' charts/todo-app/values-dev.yaml)
          echo "Promoting IMAGE_TAG=$IMAGE_TAG from dev → staging"

          # Promeut le même tag vers staging (aucun rebuild)
          yq eval '
            .backend.image.tag  = strenv(IMAGE_TAG) |
            .frontend.image.tag = strenv(IMAGE_TAG)
          ' -i charts/todo-app/values-staging.yaml

          git config user.email "${GIT_USER_EMAIL}"
          git config user.name "${GIT_USER_NAME}"
          git add charts/todo-app/values-staging.yaml

          if git diff --cached --quiet; then echo "No changes"; exit 0; fi

          git commit -m "ci: promote staging → ${IMAGE_TAG} (from dev)"
          git push origin HEAD:main
          echo "GitOps staging promote ✔"

  # ─────────────────────────────────────────────────────────────
  # JOB 5 - Promote staging → prod-sim (NO docker build)
  # Runs on: git tag v* ONLY
  # Le tag Git = gate humain intentionnel (pas d'approbation automatique)
  # Lit le tag validé en staging, l'écrit dans prod-sim
  # ─────────────────────────────────────────────────────────────
  promote-prod-sim:
    name: Promote staging → prod-sim
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Promote image tag staging → prod-sim
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_REPO: ${{ vars.CONFIG_REPO }}
          GIT_TAG: ${{ github.ref_name }}
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_USER_NAME: "github-actions[bot]"
        run: |
          set -euo pipefail

          git clone --depth 1 \
            https://x-access-token:${GH_PAT}@github.com/${CONFIG_REPO}.git config-repo
          cd config-repo
          git pull --rebase origin main

          # Lit le tag actuellement validé en staging
          IMAGE_TAG=$(yq eval '.backend.image.tag' charts/todo-app/values-staging.yaml)
          echo "Promoting IMAGE_TAG=$IMAGE_TAG from staging → prod-sim (release $GIT_TAG)"

          # Promeut le même tag vers prod-sim (aucun rebuild)
          yq eval '
            .backend.image.tag = strenv(IMAGE_TAG) |
            .frontend.image.tag = strenv(IMAGE_TAG)
          ' -i charts/todo-app/values-prod-sim.yaml

          git config user.email "${GIT_USER_EMAIL}"
          git config user.name "${GIT_USER_NAME}"
          git add charts/todo-app/values-prod-sim.yaml

          if git diff --cached --quiet; then echo "No changes"; exit 0; fi

          git commit -m "ci: promote prod-sim → ${IMAGE_TAG} (release ${GIT_TAG})"
          git push origin HEAD:main
          echo "GitOps prod-sim promote ✔"
