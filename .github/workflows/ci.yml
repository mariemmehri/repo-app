name: CI - Build, Test and Push to GCP Artifact Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  BACKEND_IMAGE: todo-backend
  FRONTEND_IMAGE: todo-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 - Backend : compile + test + upload JAR
  # ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend - Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and Test
        run: mvn verify -q

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 - Frontend : build + upload dist
  # ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3 - Docker Build and Push to GCP Artifact Registry
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'
    env:
      # ✅ REGISTRY défini au niveau du job, pas globalement
      REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── Authentification GCP via OIDC ─────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # ── Backend ───────────────────────────────────────────────
      - name: Build Backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            ./backend

      - name: Scan Backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Push Backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      # ── Frontend ──────────────────────────────────────────────
      - name: Build Frontend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            ./frontend

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Push Frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      # ── GitOps - Update repo-config ───────────────────────────
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in repo-config
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_REPO: ${{ vars.CONFIG_REPO }}
          VALUES_FILE: charts/todo-app/values-staging.yaml
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_USER_NAME: "github-actions[bot]"
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }} #src unique

        run: |
          set -euo pipefail

          echo "Using IMAGE_TAG=$IMAGE_TAG"

          # ─────────────────────────────────────────────
          # 1. VERIFY IMAGE EXISTS IN REGISTRY (CRITICAL FIX)
          # ─────────────────────────────────────────────
          echo "Checking backend image.."

          gcloud artifacts docker tags list \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }} \
            --filter="tag:${IMAGE_TAG}" \
            --format="value(tag)" | grep -q "${IMAGE_TAG}"

          echo "Backend image exists ✔"

          echo "Checking frontend image..."

          gcloud artifacts docker tags list \
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }} \
            --filter="tag:${IMAGE_TAG}" \
            --format="value(tag)" | grep -q "${IMAGE_TAG}"

          echo "Frontend image exists ✔"

          # ─────────────────────────────────────────────
          # 2. CLONE CONFIG REPO
          # ─────────────────────────────────────────────
          git clone --depth 1 \
            https://x-access-token:${GH_PAT}@github.com/${CONFIG_REPO}.git \
            config-repo

          cd config-repo

          # ─────────────────────────────────────────────
          # 3. UPDATE VALUES FILE
          # ─────────────────────────────────────────────
          yq eval '
            .backend.image.tag = strenv(IMAGE_TAG) |
            .frontend.image.tag = strenv(IMAGE_TAG)
          ' -i ${VALUES_FILE}

          echo "Updated values:"
          yq eval '.backend.image.tag, .frontend.image.tag' ${VALUES_FILE}

          # ─────────────────────────────────────────────
          # 4. COMMIT + PUSH
          # ─────────────────────────────────────────────
          git config user.email "${GIT_USER_EMAIL}"
          git config user.name "${GIT_USER_NAME}"

          git add ${VALUES_FILE}

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "ci: update image tags to ${IMAGE_TAG}"

          git push origin HEAD:main

          echo "GitOps update completed ✔"
