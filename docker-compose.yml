version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-backend
    ports:
      - "8081:8081"
    networks:
      - hr-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hr-network

networks:
  hr-network:
    driver: bridge
